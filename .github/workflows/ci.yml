name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Build and Test
    # The package targets macOS 26 (Tahoe), so it needs the macOS 26 SDK / Swift 6.2 toolchain.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test
